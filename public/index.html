<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Dashboard - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      color: #667eea;
      font-size: 28px;
      margin-bottom: 5px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .message {
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #f0f0f0;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: #999;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .dashboard {
      display: none;
    }

    .dashboard.active {
      display: block;
    }

    .dashboard-header {
      margin-bottom: 30px;
    }

    .dashboard-header h2 {
      color: #333;
      margin-bottom: 10px;
    }

    .user-info {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    .user-info p {
      margin: 5px 0;
      color: #666;
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }

    .stat-card {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 5px;
      text-align: center;
    }

    .stat-card h3 {
      color: #667eea;
      font-size: 24px;
      margin-bottom: 5px;
    }

    .stat-card p {
      color: #999;
      font-size: 12px;
    }

    .logout-btn {
      width: 100%;
      padding: 12px;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
    }

    .logout-btn:hover {
      background: #c82333;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login/Register Section -->
    <div id="authSection" class="card">
      <div class="header">
        <h1>📊 Data Dashboard</h1>
        <p>Sistema de Autenticação</p>
      </div>

      <div id="message" class="message"></div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('register')">Registrar</button>
      </div>

      <!-- Login Tab -->
      <div id="login" class="tab-content active">
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="login-username">Usuário</label>
            <input type="text" id="login-username" required>
          </div>
          <div class="form-group">
            <label for="login-password">Senha</label>
            <input type="password" id="login-password" required>
          </div>
          <div class="button-group">
            <button type="submit" class="btn-primary">Entrar</button>
          </div>
        </form>
      </div>

      <!-- Register Tab -->
      <div id="register" class="tab-content">
        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="register-username">Usuário</label>
            <input type="text" id="register-username" required>
          </div>
          <div class="form-group">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" required>
          </div>
          <div class="form-group">
            <label for="register-password">Senha</label>
            <input type="password" id="register-password" required>
          </div>
          <div class="form-group">
            <label for="register-confirm">Confirmar Senha</label>
            <input type="password" id="register-confirm" required>
          </div>
          <div class="button-group">
            <button type="submit" class="btn-primary">Registrar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="card dashboard">
      <div class="dashboard-header">
        <h2>Bem-vindo ao Dashboard!</h2>
        <div class="user-info">
          <p><strong>Usuário:</strong> <span id="dashboard-username"></span></p>
          <p><strong>Email:</strong> <span id="dashboard-email"></span></p>
          <p><strong>Perfil:</strong> <span id="dashboard-role"></span></p>
        </div>
      </div>

      <h3>Estatísticas</h3>
      <div class="stats">
        <div class="stat-card">
          <h3>150</h3>
          <p>Usuários</p>
        </div>
        <div class="stat-card">
          <h3>1.2K</h3>
          <p>Dados</p>
        </div>
        <div class="stat-card">
          <h3>89</h3>
          <p>Consultas</p>
        </div>
        <div class="stat-card">
          <h3>98%</h3>
          <p>Uptime</p>
        </div>
      </div>

      <button class="logout-btn" onclick="handleLogout()">Sair</button>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;
    let currentUser = null;

    window.addEventListener('load', () => {
      const token = localStorage.getItem('authToken');
      if (token) {
        showDashboard(JSON.parse(localStorage.getItem('userData')));
      }
    });

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
      hideMessage();
    }

    function showMessage(text, type) {
      const messageEl = document.getElementById('message');
      messageEl.textContent = text;
      messageEl.className = `message ${type}`;
    }

    function hideMessage() {
      const messageEl = document.getElementById('message');
      messageEl.className = 'message';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;

      try {
        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          showMessage(data.error || 'Erro no login', 'error');
          return;
        }

        localStorage.setItem('authToken', data.user.token);
        localStorage.setItem('userData', JSON.stringify(data.user));
        showMessage('Login realizado com sucesso!', 'success');
        setTimeout(() => showDashboard(data.user), 1000);
      } catch (error) {
        showMessage('Erro ao conectar ao servidor', 'error');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('register-username').value;
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      const confirmPassword = document.getElementById('register-confirm').value;

      try {
        const response = await fetch(`${API_URL}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, confirmPassword })
        });

        const data = await response.json();

        if (!response.ok) {
          showMessage(data.error || 'Erro no registro', 'error');
          return;
        }

        showMessage('Usuário registrado com sucesso! Faça login para continuar.', 'success');
        setTimeout(() => switchTab('login'), 2000);
      } catch (error) {
        showMessage('Erro ao conectar ao servidor', 'error');
      }
    }

    function showDashboard(user) {
      currentUser = user;
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('dashboardSection').classList.add('active');
      document.getElementById('dashboard-username').textContent = user.username;
      document.getElementById('dashboard-email').textContent = user.email;
      document.getElementById('dashboard-role').textContent = user.role || 'Usuário';
    }

    async function handleLogout() {
      try {
        await fetch(`${API_URL}/api/auth/logout`, { method: 'POST' });
      } catch (error) {
        console.error('Erro ao fazer logout:', error);
      }

      localStorage.removeItem('authToken');
      localStorage.removeItem('userData');
      location.reload();
    }
  </script>
</body>
</html>
